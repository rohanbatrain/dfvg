site_name: DFVG
site_description: DJI Footage Variant Generator - Professional transcoding workflow for DJI action cameras.
site_author: DFVG Team
site_url: https://dfvg.example.com
repo_url: https://github.com/example/dfvg
repo_name: example/dfvg

theme:
  name: material
  palette: 
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true 
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - User Guide:
      - CLI Usage: cli_usage.md
      - Web Interface: web_interface.md
      - Workflows: workflows.md
      - Mobile App: mobile_app.md
  - API Reference: api_reference.md
  - Developer Guide: developer_guide.md
